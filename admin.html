<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - 접속기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #0a0a0a;
      --white:   #ffffff;
      --gray-50: #f9f9f9;
      --gray-100:#f2f2f2;
      --gray-200:#e5e5e5;
      --gray-300:#dddddd;
      --gray-400:#aaaaaa;
      --gray-600:#666666;
      --accent:  #0057ff;
      --font-ko: 'Noto Sans KR', sans-serif;
      --font-en: 'Space Grotesk', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { 
      font-family: var(--font-ko); 
      background: var(--white); 
      color: var(--black); 
      overflow-x: hidden;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }

    h1 {
      font-family: var(--font-en);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--black);
    }

    .subtitle {
      font-size: 14px;
      color: var(--gray-600);
      margin-bottom: 32px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 20px;
      border-radius: 999px;
      border: 1px solid var(--gray-200);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font-ko);
    }

    button:hover {
      background: var(--accent);
      color: var(--white);
      border-color: var(--accent);
    }

    button.danger {
      border-color: #ff4444;
      color: #ff4444;
    }

    button.danger:hover {
      background: #ff4444;
      color: var(--white);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-box {
      padding: 16px;
      background: var(--gray-50);
      border-radius: 8px;
      border: 1px solid var(--gray-200);
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray-600);
      margin-bottom: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--black);
      font-family: var(--font-en);
    }

    .records {
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      overflow: hidden;
    }

    .record-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 12px 16px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .record-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-200);
      font-size: 14px;
      align-items: center;
      transition: background .2s;
    }

    .record-item:last-child {
      border-bottom: none;
    }

    .record-item:hover {
      background: var(--gray-50);
    }

    .record-time {
      font-family: var(--font-en);
      font-weight: 500;
      color: var(--black);
    }

    .record-ip {
      font-family: var(--font-en);
      color: var(--gray-600);
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: gap .2s;
    }

    .back-link:hover {
      gap: 12px;
    }

    .status-message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .status-message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }

    .status-message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 홈으로</a>
    <h1>Admin Panel</h1>
    <p class="subtitle">접속 기록 확인 (Supabase 실시간 동기화)</p>

    <div id="statusMessage" class="status-message"></div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">총 접속 횟수</div>
        <div class="stat-value" id="totalVisits">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">오늘 접속</div>
        <div class="stat-value" id="todayVisits">0</div>
      </div>
    </div>

    <div class="controls">
      <button id="refreshBtn" onclick="loadAndRenderRecords()">🔄 새로고침</button>
      <button id="exportBtn" onclick="exportData()">📥 CSV 다운로드</button>
      <button class="danger" id="clearBtn" onclick="clearData()">🗑️ 기록 초기화</button>
    </div>

    <div class="records">
      <div class="record-header">
        <div>접속 시간</div>
        <div>IP 주소</div>
      </div>
      <div id="recordsList"></div>
    </div>
  </div>

  <script>
    // Supabase 설정
    const SUPABASE_URL = 'https://qidppelexjglvgtvfuyw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_S4TzIhPgqYIpNjdMT5TC3Q_wnFfoz8F';

    let supabase = null;

    // 현재 시간 포맷 함수 (YY-MM-DD HH:MM AM/PM 형식)
    function formatDateTime(date) {
      const year = String(date.getFullYear()).slice(-2);
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      let hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const hoursStr = String(hours).padStart(2, '0');
      return `${year}-${month}-${day} ${hoursStr}:${minutes} ${ampm}`;
    }

    // 상태 메시지 표시
    function showStatus(message, type = 'success') {
      const el = document.getElementById('statusMessage');
      el.textContent = message;
      el.className = `status-message ${type}`;
      setTimeout(() => {
        el.className = 'status-message';
      }, 3000);
    }

    // Supabase 초기화
    function initSupabase() {
      if (SUPABASE_URL === 'https://YOUR_SUPABASE_URL.supabase.co') {
        showStatus('⚠️ Supabase URL과 Key를 설정해주세요!', 'error');
        return false;
      }
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      return true;
    }

    // IP 주소 가져오기
    async function getIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        return 'Unknown IP';
      }
    }

    // 서버에 접속 기록 저장
    async function saveAccessLog() {
      if (!supabase) return;
      
      try {
        const ip = await getIP();
        const now = new Date();
        const timeStr = formatDateTime(now);

        const { data, error } = await supabase
          .from('access_logs')
          .insert([{ time: timeStr, ip: ip }]);

        if (error) {
          console.error('Save error:', error);
        } else {
          await loadAndRenderRecords();
        }
      } catch (error) {
        console.error('Error saving access log:', error);
      }
    }

    // Supabase에서 기록 로드 및 렌더링
    async function loadAndRenderRecords() {
      if (!supabase) return;

      try {
        const { data: logs, error } = await supabase
          .from('access_logs')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(1000);

        if (error) {
          console.error('Load error:', error);
          showStatus(error.message, 'error');
          return;
        }

        renderRecords(logs);

        const today = new Date().toISOString().split('T')[0];
        const todayCount = logs.filter(l => l.created_at.startsWith(today)).length;
        updateStats(logs.length, todayCount);
      } catch (error) {
        console.error('Error loading records:', error);
        showStatus('데이터 로드 실패', 'error');
      }
    }

    // 기록 렌더링
    function renderRecords(logs) {
      const recordsList = document.getElementById('recordsList');

      if (!logs || logs.length === 0) {
        recordsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🌐</div>
            <p>아직 접속 기록이 없습니다.</p>
          </div>
        `;
        return;
      }

      recordsList.innerHTML = logs.map(log => `
        <div class="record-item">
          <div class="record-time">${log.time}</div>
          <div class="record-ip">${log.ip}</div>
        </div>
      `).join('');
    }

    // 통계 업데이트
    function updateStats(total, today) {
      document.getElementById('totalVisits').textContent = total || 0;
      document.getElementById('todayVisits').textContent = today || 0;
    }

    // CSV 다운로드
    async function exportData() {
      if (!supabase) return;

      try {
        document.getElementById('exportBtn').disabled = true;

        const { data: logs, error } = await supabase
          .from('access_logs')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        let csv = 'Time,IP\n';
        logs.forEach(log => {
          csv += `"${log.time}","${log.ip}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `access_logs_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showStatus('CSV 다운로드 완료!', 'success');
      } catch (error) {
        showStatus('CSV 다운로드 실패', 'error');
        console.error(error);
      } finally {
        document.getElementById('exportBtn').disabled = false;
      }
    }

    // 기록 초기화
    async function clearData() {
      if (!supabase) return;
      if (!confirm('정말 모든 접속 기록을 삭제하시겠습니까?')) return;

      try {
        document.getElementById('clearBtn').disabled = true;

        const { error } = await supabase
          .from('access_logs')
          .delete()
          .neq('id', '00000000-0000-0000-0000-000000000000');

        if (error) throw error;

        await loadAndRenderRecords();
        showStatus('모든 기록이 삭제되었습니다.', 'success');
      } catch (error) {
        showStatus('기록 삭제 실패', 'error');
        console.error(error);
      } finally {
        document.getElementById('clearBtn').disabled = false;
      }
    }

    // 페이지 로드 시 초기화
    window.addEventListener('DOMContentLoaded', () => {
      if (!initSupabase()) return;
      
      saveAccessLog();
      loadAndRenderRecords();

      // 5초마다 서버에서 최신 데이터 갱신
      setInterval(loadAndRenderRecords, 5000);
    });
  </script>
</body>
</html>
