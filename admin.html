<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - 접속기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #0a0a0a;
      --white:   #ffffff;
      --gray-50: #f9f9f9;
      --gray-100:#f2f2f2;
      --gray-200:#e5e5e5;
      --gray-300:#dddddd;
      --gray-400:#aaaaaa;
      --gray-600:#666666;
      --accent:  #0057ff;
      --font-ko: 'Noto Sans KR', sans-serif;
      --font-en: 'Space Grotesk', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { 
      font-family: var(--font-ko); 
      background: var(--white); 
      color: var(--black); 
      overflow-x: hidden;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }

    h1 {
      font-family: var(--font-en);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--black);
    }

    .subtitle {
      font-size: 14px;
      color: var(--gray-600);
      margin-bottom: 32px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 20px;
      border-radius: 999px;
      border: 1px solid var(--gray-200);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font-ko);
    }

    button:hover {
      background: var(--accent);
      color: var(--white);
      border-color: var(--accent);
    }

    button.danger {
      border-color: #ff4444;
      color: #ff4444;
    }

    button.danger:hover {
      background: #ff4444;
      color: var(--white);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-box {
      padding: 16px;
      background: var(--gray-50);
      border-radius: 8px;
      border: 1px solid var(--gray-200);
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray-600);
      margin-bottom: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--black);
      font-family: var(--font-en);
    }

    .records {
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      overflow: hidden;
    }

    .record-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 12px 16px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .record-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-200);
      font-size: 14px;
      align-items: center;
      transition: background .2s;
    }

    .record-item:last-child {
      border-bottom: none;
    }

    .record-item:hover {
      background: var(--gray-50);
    }

    .record-time {
      font-family: var(--font-en);
      font-weight: 500;
      color: var(--black);
    }

    .record-ip {
      font-family: var(--font-en);
      color: var(--gray-600);
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: gap .2s;
    }

    .back-link:hover {
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 홈으로</a>
    <h1>Admin Panel</h1>
    <p class="subtitle">접속 기록 확인</p>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">총 접속 횟수</div>
        <div class="stat-value" id="totalVisits">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">오늘 접속</div>
        <div class="stat-value" id="todayVisits">0</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="exportData()">CSV 다운로드</button>
      <button class="danger" onclick="clearData()">기록 초기화</button>
    </div>

    <div class="records">
      <div class="record-header">
        <div>접속 시간</div>
        <div>IP 주소</div>
      </div>
      <div id="recordsList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'admin_access_logs';

    // 현재 시간 포맷 함수 (YY-MM-DD HH:MM AM/PM 형식)
    function formatDateTime(date) {
      const year = String(date.getFullYear()).slice(-2);
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      let hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const hoursStr = String(hours).padStart(2, '0');
      return `${year}-${month}-${day} ${hoursStr}:${minutes} ${ampm}`;
    }

    // IP 주소 가져오기
    async function getIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        return 'Unknown IP';
      }
    }

    // 접속 기록 저장
    async function saveAccessLog() {
      const ip = await getIP();
      const now = new Date();
      const record = {
        time: formatDateTime(now),
        ip: ip,
        timestamp: now.getTime()
      };

      let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      logs.unshift(record); // 최신 기록을 앞에 추가
      
      // 최대 1000개 기록만 유지
      if (logs.length > 1000) {
        logs = logs.slice(0, 1000);
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
      renderRecords();
      updateStats();
    }

    // 기록 렌더링
    function renderRecords() {
      const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const recordsList = document.getElementById('recordsList');

      if (logs.length === 0) {
        recordsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🌐</div>
            <p>아직 접속 기록이 없습니다.</p>
          </div>
        `;
        return;
      }

      recordsList.innerHTML = logs.map(log => `
        <div class="record-item">
          <div class="record-time">${log.time}</div>
          <div class="record-ip">${log.ip}</div>
        </div>
      `).join('');
    }

    // 통계 업데이트
    function updateStats() {
      const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const todayCount = logs.filter(log => {
        const logDate = new Date(parseInt(log.timestamp));
        logDate.setHours(0, 0, 0, 0);
        return logDate.getTime() === today.getTime();
      }).length;

      document.getElementById('totalVisits').textContent = logs.length;
      document.getElementById('todayVisits').textContent = todayCount;
    }

    // CSV 다운로드
    function exportData() {
      const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      
      let csv = 'Time,IP\n';
      logs.forEach(log => {
        csv += `"${log.time}","${log.ip}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `access_logs_${new Date().toISOString().split('T')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 기록 초기화
    function clearData() {
      if (confirm('정말 모든 접속 기록을 삭제하시겠습니까?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderRecords();
        updateStats();
      }
    }

    // 페이지 로드 시 초기화
    window.addEventListener('DOMContentLoaded', () => {
      saveAccessLog();
      renderRecords();
      updateStats();
    });
  </script>
</body>
</html>
